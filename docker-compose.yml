# requires docker compose v2.20+
# Usage:
#   docker compose up -d ocr-mcp rag-mcp scheduling-api   # bring up infra
#   docker compose run --rm generated-agent --image /fixtures/sample_medical_order.png
#
# All services resolve each other via Docker Compose DNS (service name = hostname).
# Only scheduling-api exposes a port to the host (AC7).
# See docs/ARCHITECTURE.md § "Variáveis de ambiente" for env var reference.
# See docs/CONFIGURATION.md for the full tunable surface (ADR-0009).

services:

  # --------------------------------------------------------------------------
  # ocr-mcp — FastMCP SSE OCR server (ADR-0001)
  # Internal only: no ports: block (AC7).  MCPs use service_started (ADR-0001).
  # --------------------------------------------------------------------------
  ocr-mcp:
    build:
      context: .
      dockerfile: ocr_mcp/Dockerfile
      args:
        # Operator can swap to pt_core_news_sm for lighter images (ADR-0009).
        PII_SPACY_MODEL_PT: "${PII_SPACY_MODEL_PT:-pt_core_news_lg}"
    environment:
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      # --- OCR tunables ---
      OCR_IMAGE_MAX_BYTES: "${OCR_IMAGE_MAX_BYTES:-5242880}"
      OCR_TIMEOUT_SECONDS: "${OCR_TIMEOUT_SECONDS:-5}"
      OCR_DEFAULT_LANGUAGE: "${OCR_DEFAULT_LANGUAGE:-pt}"
      OCR_TESSERACT_LANG: "${OCR_TESSERACT_LANG:-por}"
      # --- PII guard tunables (runs in-process inside ocr-mcp) ---
      PII_DEFAULT_LANGUAGE: "${PII_DEFAULT_LANGUAGE:-pt}"
      PII_TEXT_MAX_BYTES: "${PII_TEXT_MAX_BYTES:-102400}"
      PII_ALLOW_LIST_MAX: "${PII_ALLOW_LIST_MAX:-1000}"
      PII_TIMEOUT_SECONDS: "${PII_TIMEOUT_SECONDS:-5}"
      PII_SCORE_THRESHOLD: "${PII_SCORE_THRESHOLD:-0.5}"
      PII_SPACY_MODEL_PT: "${PII_SPACY_MODEL_PT:-pt_core_news_lg}"
      PII_SPACY_MODEL_EN: "${PII_SPACY_MODEL_EN:-en_core_web_lg}"
    # No ports: MCPs are internal only (AC7, GUIDELINES §3)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/sse', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: on-failure:3

  # --------------------------------------------------------------------------
  # rag-mcp — FastMCP SSE RAG server (ADR-0007)
  # Internal only: no ports: block (AC7).
  # --------------------------------------------------------------------------
  rag-mcp:
    build:
      context: .
      dockerfile: rag_mcp/Dockerfile
    environment:
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      # --- RAG tunables ---
      RAG_QUERY_MAX_CHARS: "${RAG_QUERY_MAX_CHARS:-500}"
      RAG_SEARCH_TIMEOUT_SECONDS: "${RAG_SEARCH_TIMEOUT_SECONDS:-2}"
      RAG_FUZZY_THRESHOLD: "${RAG_FUZZY_THRESHOLD:-80}"
      # Absolute path inside the container where the exam catalog CSV lives.
      RAG_CATALOG_PATH: "${RAG_CATALOG_PATH:-/app/rag_mcp/rag_mcp/data/exams.csv}"
    # No ports: MCPs are internal only (AC7)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/sse', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: on-failure:3

  # --------------------------------------------------------------------------
  # scheduling-api — FastAPI appointment service (port 8000 exposed to host)
  # --------------------------------------------------------------------------
  scheduling-api:
    build:
      context: .
      dockerfile: scheduling_api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      # --- Scheduling API tunables ---
      SCHEDULING_BODY_SIZE_LIMIT_BYTES: "${SCHEDULING_BODY_SIZE_LIMIT_BYTES:-262144}"
      SCHEDULING_REQUEST_TIMEOUT_SECONDS: "${SCHEDULING_REQUEST_TIMEOUT_SECONDS:-10}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    restart: on-failure:3

  # --------------------------------------------------------------------------
  # generated-agent — ADK CLI agent (one-shot; run via docker compose run)
  # Waits for scheduling-api to be healthy; MCPs use service_started (AC9).
  # No ports exposed (AC7). Fixtures mounted read-only (AC12).
  # --------------------------------------------------------------------------
  generated-agent:
    build:
      context: .
      dockerfile: generated_agent/Dockerfile
      args:
        # Operator can swap to pt_core_news_sm for lighter images (ADR-0009).
        PII_SPACY_MODEL_PT: "${PII_SPACY_MODEL_PT:-pt_core_news_lg}"
    env_file:
      - .env
    environment:
      # --- Agent runtime tunables ---
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY}"
      GOOGLE_GENAI_USE_VERTEXAI: "${GOOGLE_GENAI_USE_VERTEXAI:-FALSE}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.5-flash-lite}"
      AGENT_TIMEOUT_SECONDS: "${AGENT_TIMEOUT_SECONDS:-300}"
      SCHEDULING_OPENAPI_FETCH_TIMEOUT_SECONDS: "${SCHEDULING_OPENAPI_FETCH_TIMEOUT_SECONDS:-10}"
      # CLI-orchestrated pre-OCR tunables (ADR-0010 / spec 0010)
      PREOCR_MCP_TIMEOUT_SECONDS: "${PREOCR_MCP_TIMEOUT_SECONDS:-10}"
      PREOCR_MCP_CONNECT_RETRIES: "${PREOCR_MCP_CONNECT_RETRIES:-1}"
      # Validator-pass safety net (spec 0009 Camada C). Default OFF.
      AGENT_VALIDATOR_PASS_ENABLED: "${AGENT_VALIDATOR_PASS_ENABLED:-false}"
      VALIDATOR_MODEL: "${VALIDATOR_MODEL:-gemini-2.5-flash-lite}"
      VALIDATOR_MAX_INPUT_BYTES: "${VALIDATOR_MAX_INPUT_BYTES:-16384}"
      VALIDATOR_TIMEOUT_SECONDS: "${VALIDATOR_TIMEOUT_SECONDS:-15}"
      # Compose DNS names override any localhost values from .env (AC10)
      OCR_MCP_URL: "${OCR_MCP_URL:-http://ocr-mcp:8001/sse}"
      RAG_MCP_URL: "${RAG_MCP_URL:-http://rag-mcp:8002/sse}"
      SCHEDULING_OPENAPI_URL: "${SCHEDULING_OPENAPI_URL:-http://scheduling-api:8000/openapi.json}"
      # --- PII guard tunables (before_model_callback runs in-process) ---
      PII_DEFAULT_LANGUAGE: "${PII_DEFAULT_LANGUAGE:-pt}"
      PII_TEXT_MAX_BYTES: "${PII_TEXT_MAX_BYTES:-102400}"
      PII_CALLBACK_TEXT_MAX_BYTES: "${PII_CALLBACK_TEXT_MAX_BYTES:-102400}"
      PII_ALLOW_LIST_MAX: "${PII_ALLOW_LIST_MAX:-1000}"
      PII_TIMEOUT_SECONDS: "${PII_TIMEOUT_SECONDS:-5}"
      PII_SCORE_THRESHOLD: "${PII_SCORE_THRESHOLD:-0.5}"
      PII_SPACY_MODEL_PT: "${PII_SPACY_MODEL_PT:-pt_core_news_lg}"
      PII_SPACY_MODEL_EN: "${PII_SPACY_MODEL_EN:-en_core_web_lg}"
    depends_on:
      scheduling-api:
        condition: service_healthy        # API must be healthy (AC9)
      ocr-mcp:
        condition: service_started        # MCP SSE has no /health (AC9, ADR-0001)
      rag-mcp:
        condition: service_started        # MCP SSE has no /health (AC9, ADR-0001)
    volumes:
      - ./docs/fixtures:/fixtures:ro      # sample_medical_order.png available at /fixtures (AC12)
    # No ports — one-shot CLI, no listening socket
    # No restart policy — one-shot; caller sees exit code
