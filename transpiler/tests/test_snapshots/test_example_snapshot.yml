.env.example: '# Google Gemini API — use direct API key (GOOGLE_GENAI_USE_VERTEXAI=FALSE)
  per ADR-0005

  GOOGLE_GENAI_USE_VERTEXAI=FALSE

  GOOGLE_API_KEY=your-api-key-here

  OCR_MCP_URL=http://ocr-mcp:8001/sse

  RAG_MCP_URL=http://rag-mcp:8002/sse

  SCHEDULING_OPENAPI_URL=http://scheduling-api:8000/openapi.json

  PII_DEFAULT_LANGUAGE=pt

  LOG_LEVEL=INFO

  '
Dockerfile: 'FROM python:3.12-slim


  WORKDIR /app


  COPY requirements.txt ./

  RUN pip install --no-cache-dir -r requirements.txt


  COPY . .


  ENV GOOGLE_GENAI_USE_VERTEXAI=FALSE


  CMD ["adk", "run", "."]

  '
__init__.py: '"""medical-order-agent — ADK agent package generated by transpiler."""


  from . import agent  # noqa: F401 — required for `adk run` / `adk web` discovery

  from .agent import root_agent


  __all__ = ["agent", "root_agent"]

  '
agent.py: "\"\"\"medical-order-agent agent — generated by transpiler.\"\"\"\n\nfrom\
  \ __future__ import annotations\n\nimport os\n\nfrom google.adk.agents import LlmAgent\n\
  from google.adk.tools.mcp_tool import McpToolset\nfrom google.adk.tools.mcp_tool.mcp_session_manager\
  \ import StreamableHTTPConnectionParams\nfrom google.adk.tools.openapi_tool.openapi_spec_parser.openapi_toolset\
  \ import OpenAPIToolset\n\n_SSE_HEADERS: dict[str, str] = {\n    \"Accept\": \"\
  application/json, text/event-stream\",\n}\n\nocr_toolset = McpToolset(\n    connection_params=StreamableHTTPConnectionParams(\n\
  \        url=os.environ.get(\"OCR_MCP_URL\", \"http://ocr-mcp:8001/sse\"),\n   \
  \     headers=_SSE_HEADERS,\n    ),\n)\n\nrag_toolset = McpToolset(\n    connection_params=StreamableHTTPConnectionParams(\n\
  \        url=os.environ.get(\"RAG_MCP_URL\", \"http://rag-mcp:8002/sse\"),\n   \
  \     headers=_SSE_HEADERS,\n    ),\n)\n\nscheduling_toolset = OpenAPIToolset(\n\
  \    spec_url=os.environ.get(\"SCHEDULING_OPENAPI_URL\", \"http://scheduling-api:8000/openapi.json\"\
  ),\n)\n\n\ndef _pii_callback(\n    callback_context: object,\n    llm_request: object,\n\
  ) -> None:\n    \"\"\"Apply PII masking to every LLM request (ADR-0003, second layer).\n\
  \n    Bloco 0005 (security) provides pii_mask at runtime.\n\n    Args:\n       \
  \ callback_context: ADK callback context (unused; present for signature compliance).\n\
  \        llm_request: ADK LLM request object whose contents are masked in-place.\n\
  \    \"\"\"\n    # Local import: avoids hard dep at module-load time when security\
  \ not yet installed.\n    # Install security/ (Bloco 0005) before running the agent.\n\
  \    from security import pii_mask  # noqa: PLC0415\n\n    if not hasattr(llm_request,\
  \ \"contents\"):\n        return\n    for content in llm_request.contents:\n   \
  \     if not hasattr(content, \"parts\"):\n            continue\n        for part\
  \ in content.parts:\n            if hasattr(part, \"text\") and isinstance(part.text,\
  \ str):\n                result = pii_mask(part.text)\n                part.text\
  \ = result.masked_text\n\n\nroot_agent = LlmAgent(\n    name=\"medical-order-agent\"\
  ,\n    model=\"gemini-2.5-flash\",\n    description=\"Agente de agendamento de exames\
  \ a partir de pedidos m\\u00e9dicos\",\n    instruction=\"Voc\\u00ea recebe uma\
  \ imagem...\",\n    tools=[\n        ocr_toolset,\n        rag_toolset,\n      \
  \  scheduling_toolset,\n    ],\n    before_model_callback=_pii_callback,\n)\n"
requirements.txt: 'google-adk>=1.0.0

  mcp[cli]>=1.0.0

  # PII guard (Bloco 0005) — install from local path in development

  -e ../security

  '
