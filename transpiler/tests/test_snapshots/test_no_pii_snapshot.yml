.env.example: '# Google Gemini API — use direct API key (GOOGLE_GENAI_USE_VERTEXAI=FALSE)
  per ADR-0005

  GOOGLE_GENAI_USE_VERTEXAI=FALSE

  GOOGLE_API_KEY=your-api-key-here

  OCR_MCP_URL=http://ocr-mcp:8001/sse

  LOG_LEVEL=INFO

  '
Dockerfile: '# Build context MUST be the repo root (not generated_agent/). See docker-compose.yml.

  # docker build -f generated_agent/Dockerfile .

  FROM python:3.12-slim


  # Install uv (ADR-0005)

  RUN pip install --no-cache-dir uv


  WORKDIR /app


  # Copy security package (local dep — ADR-0003 Layer 2 callback)

  # Context = repo root, so paths are relative to that root.

  COPY security /app/security


  # Copy generated agent

  COPY no_pii_agent /app/no_pii_agent


  # Install all deps via uv pip install --system (ADR-0005)

  RUN cd /app/no_pii_agent && uv pip install --system --no-cache .


  # Google Gemini direct API — no Vertex AI (ADR-0005)

  ENV GOOGLE_GENAI_USE_VERTEXAI=FALSE

  ENV PYTHONUNBUFFERED=1


  # One-shot CLI — no HEALTHCHECK (compose uses service_started, ADR-0001).

  # ENTRYPOINT (not CMD) so `docker compose run ... --image <path>` appends to

  # the module invocation instead of replacing it. With CMD, runtime args shadow

  # the module and Docker tries to exec `--image` as a binary.

  ENTRYPOINT ["python", "-m", "no_pii_agent"]

  '
__init__.py: '"""no-pii-agent — ADK agent package generated by transpiler."""


  from . import agent  # noqa: F401 — required for `adk run` / `adk web` discovery

  from .agent import root_agent


  __all__ = ["agent", "root_agent"]

  '
__main__.py: "\"\"\"no-pii-agent runner CLI — generated by transpiler.\"\"\"\n\nfrom\
  \ __future__ import annotations\n\nimport argparse\nimport asyncio\nimport json\n\
  import logging\nimport os\nimport sys\nimport typing\nimport uuid\nfrom datetime\
  \ import datetime\nfrom typing import Any\n\nimport pydantic\nfrom pydantic import\
  \ BaseModel, field_validator\n\nfrom generated_agent.logging_ import configure_logging\n\
  from generated_agent.preocr import _build_preocr_prompt, _PreOcrError, _run_preocr\n\
  \n_LOGGER = logging.getLogger(__name__)\n\n_AGENT_TIMEOUT = float(os.environ.get(\"\
  AGENT_TIMEOUT_SECONDS\", \"300\"))  # seconds, ADR-0008 / AC18\n_PREOCR_MCP_TIMEOUT\
  \ = float(os.environ.get(\"PREOCR_MCP_TIMEOUT_SECONDS\", \"10\"))  # spec 0010\n\
  _PREOCR_MCP_CONNECT_RETRIES = int(os.environ.get(\"PREOCR_MCP_CONNECT_RETRIES\"\
  , \"1\"))\n_OCR_MCP_URL = os.environ.get(\"OCR_MCP_URL\", \"http://ocr-mcp:8001/sse\"\
  )\n\n# Error code constants (MAJOR-3 + spec 0010)\n_E_AGENT_INPUT_NOT_FOUND = \"\
  E_AGENT_INPUT_NOT_FOUND\"\n_E_AGENT_OUTPUT_INVALID = \"E_AGENT_OUTPUT_INVALID\"\n\
  _E_AGENT_TIMEOUT = \"E_AGENT_TIMEOUT\"\n_E_OCR_UNKNOWN_IMAGE = \"E_OCR_UNKNOWN_IMAGE\"\
  \n_E_MCP_UNAVAILABLE = \"E_MCP_UNAVAILABLE\"\n\n\n# ---------------------------------------------------------------------------\n\
  # Output schema — validates LLM runner result before printing (AC19)\n# ---------------------------------------------------------------------------\n\
  \n\nclass ExamResolution(BaseModel):\n    \"\"\"Single exam resolved by the agent.\"\
  \"\"\n\n    name: str\n    code: str\n    score: float\n    inconclusive: bool =\
  \ False\n\n    @field_validator(\"score\")\n    @classmethod\n    def score_in_range(cls,\
  \ v: float) -> float:\n        \"\"\"Validate score is in [0.0, 1.0].\"\"\"\n  \
  \      if not (0.0 <= v <= 1.0):\n            msg = f\"score must be in [0.0, 1.0],\
  \ got {v}\"\n            raise ValueError(msg)\n        return v\n\n\nclass _RunnerOutput(BaseModel):\n\
  \    \"\"\"Expected structure of the agent's final output (AC19).\"\"\"\n\n    exams:\
  \ list[ExamResolution]\n    appointment_id: str\n    scheduled_for: datetime\n\n\
  \n# ---------------------------------------------------------------------------\n\
  # ASCII table formatter (AC17) — pure function, no Rich, no ANSI\n# ---------------------------------------------------------------------------\n\
  \n\ndef format_ascii_table(\n    rows: list[tuple[str, str, float, bool]],\n   \
  \ appointment_id: str,\n    scheduled_for: datetime | str,\n) -> str:\n    \"\"\"\
  Format exam results as a plain ASCII table.\n\n    Args:\n        rows: List of\
  \ (name, code, score, inconclusive) tuples.\n        appointment_id: Scheduling\
  \ API appointment ID.\n        scheduled_for: Scheduled datetime (datetime or ISO\
  \ string).\n\n    Returns:\n        Multi-line ASCII string in the exact format\
  \ required by AC17.\n    \"\"\"\n    col_widths = [3, 22, 9]  # #, Exame, Codigo\
  \ — minimum widths\n    for i, (name, code, _, _) in enumerate(rows):\n        col_widths[0]\
  \ = max(col_widths[0], len(str(i + 1)))\n        col_widths[1] = max(col_widths[1],\
  \ len(name))\n        col_widths[2] = max(col_widths[2], len(code))\n\n    def _sep()\
  \ -> str:\n        return (\n            \"+\"\n            + \"-\" * (col_widths[0]\
  \ + 2)\n            + \"+\"\n            + \"-\" * (col_widths[1] + 2)\n       \
  \     + \"+\"\n            + \"-\" * (col_widths[2] + 2)\n            + \"+\"\n\
  \        )\n\n    def _row(a: str, b: str, c: str) -> str:\n        return (\n \
  \           \"| \"\n            + a.ljust(col_widths[0])\n            + \" | \"\n\
  \            + b.ljust(col_widths[1])\n            + \" | \"\n            + c.ljust(col_widths[2])\n\
  \            + \" |\"\n        )\n\n    lines: list[str] = [\n        _sep(),\n\
  \        _row(\"#\", \"Exame\", \"Codigo\"),\n        _sep(),\n    ]\n    for i,\
  \ (name, code, score, inconclusive) in enumerate(rows):\n        label = code if\
  \ not inconclusive else f\"{code}?\"\n        lines.append(_row(str(i + 1), name,\
  \ label))\n    lines.append(_sep())\n\n    sched_str = (\n        scheduled_for.isoformat()\n\
  \        if isinstance(scheduled_for, datetime)\n        else str(scheduled_for)\n\
  \    )\n    lines.append(f\"Appointment ID: {appointment_id}  |  Scheduled: {sched_str}\"\
  )\n    return \"\\n\".join(lines)\n\n\n# ---------------------------------------------------------------------------\n\
  # Error helpers (MAJOR-1: NoReturn + correlation_id in envelope)\n# ---------------------------------------------------------------------------\n\
  \n\ndef _exit_error(\n    code: str,\n    message: str,\n    correlation_id: str,\n\
  \    hint: str | None = None,\n    exit_code: int = 1,\n) -> typing.NoReturn:\n\
  \    \"\"\"Print canonical error envelope to stderr and exit.\n\n    Envelope shape\
  \ matches ADR-0008 / scheduling_api ErrorEnvelope:\n        {\"error\": {\"code\"\
  : ..., \"message\": ..., \"hint\": ...}, \"correlation_id\": ...}\n\n    Args:\n\
  \        code: E_* error code per ADR-0008.\n        message: Human-readable error\
  \ message.\n        correlation_id: UUID from main() scope for traceability.\n \
  \       hint: Optional corrective-action hint.\n        exit_code: Process exit\
  \ code (1=input, 2=timeout, 3=output, default=1).\n    \"\"\"\n    envelope: dict[str,\
  \ Any] = {\n        \"error\": {\n            \"code\": code,\n            \"message\"\
  : message,\n            \"hint\": hint,\n        },\n        \"correlation_id\"\
  : correlation_id,\n    }\n    print(json.dumps(envelope, ensure_ascii=False), file=sys.stderr)\n\
  \    sys.exit(exit_code)\n\n\n# ---------------------------------------------------------------------------\n\
  # Argument parser (MINOR-9: --spec removed — not wired up)\n# ---------------------------------------------------------------------------\n\
  \n\ndef _parse_args() -> argparse.Namespace:\n    \"\"\"Parse CLI arguments.\n\n\
  \    Returns:\n        Parsed namespace with .image attribute.\n    \"\"\"\n   \
  \ parser = argparse.ArgumentParser(\n        description=\"no-pii-agent — ADK agent\
  \ runner (generated by transpiler)\",\n    )\n    parser.add_argument(\n       \
  \ \"--image\",\n        required=True,\n        help=\"Path to the medical order\
  \ image (PNG/JPEG).\",\n    )\n    return parser.parse_args()\n\n\n# ---------------------------------------------------------------------------\n\
  # Agent runner (BLOCKER-1: inline_data Blob, BLOCKER-2: factory, MAJOR-4: cleanup)\n\
  # ---------------------------------------------------------------------------\n\n\
  \nasync def _run_agent(exams: list[str], correlation_id: str) -> Any:\n    \"\"\"\
  Run the ADK agent with a text-only prompt containing the exam list.\n\n    Pre-OCR\
  \ (spec 0010 / ADR-0010): the OCR step runs in the CLI before this\n    function\
  \ is called; the agent receives the detected exams as plain text\n    and never\
  \ sees the image bytes. This eliminates the \"LLM fabricates\n    base64\" failure\
  \ mode documented in ADR-0010.\n\n    Args:\n        exams: Exam names already extracted\
  \ and PII-masked by the OCR server.\n        correlation_id: UUID to propagate as\
  \ X-Correlation-ID.\n\n    Returns:\n        Final ADK Event or None.\n    \"\"\"\
  \n    from google.adk.runners import Runner  # noqa: PLC0415\n    from google.adk.sessions\
  \ import InMemorySessionService  # noqa: PLC0415\n\n    from generated_agent.agent\
  \ import _build_agent  # noqa: PLC0415\n\n    agent = _build_agent(correlation_id)\n\
  \    toolsets = [t for t in agent.tools if hasattr(t, \"close\")]\n\n    session_service\
  \ = InMemorySessionService()\n    runner = Runner(\n        agent=agent,\n     \
  \   app_name=\"no_pii_agent\",\n        session_service=session_service,\n    )\n\
  \    session = await session_service.create_session(\n        app_name=\"no_pii_agent\"\
  ,\n        user_id=\"cli-user\",\n    )\n\n    prompt_content = _build_preocr_prompt(exams)\n\
  \n    _LOGGER.info(\n        \"agent.run.start\",\n        extra={\n           \
  \ \"event\": \"agent.run.start\",\n            \"correlation_id\": correlation_id,\n\
  \            \"exam_count\": len(exams),\n        },\n    )\n\n    final_response\
  \ = None\n    try:  # MAJOR-4: try/finally for session cleanup\n        async for\
  \ event in runner.run_async(\n            user_id=\"cli-user\",\n            session_id=session.id,\n\
  \            new_message=prompt_content,\n        ):\n            if hasattr(event,\
  \ \"is_final_response\") and event.is_final_response():\n                final_response\
  \ = event\n                break\n    finally:\n        # MAJOR-4: close MCP toolsets\
  \ regardless of success/timeout/error\n        for toolset in toolsets:\n      \
  \      try:\n                await toolset.close()\n            except Exception:\
  \  # noqa: BLE001\n                pass  # cleanup errors must not mask the original\
  \ exception\n        # InMemorySessionService has no persistent resources — no delete\
  \ needed.\n        # If a persistent session service is added, call delete_session()\
  \ here.\n\n    return final_response\n\n\ndef _parse_runner_output(raw: Any, correlation_id:\
  \ str) -> _RunnerOutput:\n    \"\"\"Parse and validate runner output against the\
  \ expected schema.\n\n    Args:\n        raw: Raw runner result (Event or dict or\
  \ string).\n        correlation_id: For logging.\n\n    Returns:\n        Validated\
  \ _RunnerOutput instance.\n\n    Raises:\n        SystemExit(3): when JSON or Pydantic\
  \ validation fails (AC19).\n    \"\"\"\n    # Extract text from ADK Event (MINOR-8:\
  \ docstring updated)\n    text: str = \"\"\n    if hasattr(raw, \"content\") and\
  \ hasattr(raw.content, \"parts\"):\n        for part in raw.content.parts:\n   \
  \         if hasattr(part, \"text\"):\n                text += part.text\n    elif\
  \ isinstance(raw, str):\n        text = raw\n    else:\n        text = str(raw)\
  \ if raw is not None else \"\"\n\n    # MAJOR-2: narrow exception catch — only JSON/Pydantic\
  \ failures are expected\n    try:\n        data = json.loads(text)\n        output\
  \ = _RunnerOutput.model_validate(data)\n    except (json.JSONDecodeError, pydantic.ValidationError)\
  \ as exc:\n        _LOGGER.error(\n            \"agent.output.invalid\",\n     \
  \       extra={\n                \"event\": \"agent.output.invalid\",\n        \
  \        \"correlation_id\": correlation_id,\n                \"error\": str(exc),\n\
  \            },\n        )\n        _exit_error(\n            code=_E_AGENT_OUTPUT_INVALID,\n\
  \            message=\"Saida do agente nao corresponde ao schema esperado.\",\n\
  \            correlation_id=correlation_id,\n            hint=\"Verifique se o agente\
  \ retornou JSON valido com campos exams[], appointment_id, scheduled_for.\",\n \
  \           exit_code=3,\n        )\n\n    return output\n\n\n# ---------------------------------------------------------------------------\n\
  # Entry point\n# ---------------------------------------------------------------------------\n\
  \n\ndef main() -> int:\n    \"\"\"CLI entry point for the generated agent runner.\n\
  \n    Returns:\n        Exit code (0 on success).\n    \"\"\"\n    configure_logging()\n\
  \    args = _parse_args()\n    correlation_id = str(uuid.uuid4())\n\n    # Read\
  \ image bytes (MAJOR-3: use correct error code for missing file)\n    image_path\
  \ = args.image\n    if not os.path.isfile(image_path):\n        _exit_error(\n \
  \           code=_E_AGENT_INPUT_NOT_FOUND,\n            message=f\"Arquivo de imagem\
  \ nao encontrado: {image_path}\",\n            correlation_id=correlation_id,\n\
  \            hint=\"Verifique o caminho passado em --image.\",\n            exit_code=1,\n\
  \        )\n\n    with open(image_path, \"rb\") as fh:\n        image_bytes = fh.read()\n\
  \n    # Pre-OCR step (spec 0010 / ADR-0010): CLI orchestrates the OCR call\n   \
  \ # deterministically before the LlmAgent sees anything. If this fails, the\n  \
  \  # agent is never invoked.\n    try:\n        exams = asyncio.run(\n         \
  \   _run_preocr(\n                image_bytes=image_bytes,\n                correlation_id=correlation_id,\n\
  \                mcp_url=_OCR_MCP_URL,\n                timeout_s=_PREOCR_MCP_TIMEOUT,\n\
  \                connect_retries=_PREOCR_MCP_CONNECT_RETRIES,\n            )\n \
  \       )\n    except _PreOcrError as exc:\n        if exc.code == _E_MCP_UNAVAILABLE:\n\
  \            _exit_error(\n                code=_E_MCP_UNAVAILABLE,\n          \
  \      message=exc.message,\n                correlation_id=correlation_id,\n  \
  \              hint=exc.hint,\n                exit_code=5,\n            )\n   \
  \     _exit_error(\n            code=exc.code,\n            message=exc.message,\n\
  \            correlation_id=correlation_id,\n            hint=exc.hint,\n      \
  \      exit_code=4,\n        )\n\n    if not exams:\n        _exit_error(\n    \
  \        code=_E_OCR_UNKNOWN_IMAGE,\n            message=\"OCR nao retornou exames\
  \ para a imagem fornecida.\",\n            correlation_id=correlation_id,\n    \
  \        hint=\"Verifique se a imagem corresponde a uma fixture registrada no ocr-mcp.\"\
  ,\n            exit_code=4,\n        )\n\n    # Run agent with hard timeout (ADR-0008\
  \ / AC18)\n    try:\n        raw = asyncio.run(\n            asyncio.wait_for(\n\
  \                _run_agent(exams, correlation_id),\n                timeout=_AGENT_TIMEOUT,\n\
  \            )\n        )\n    except TimeoutError:  # MINOR-7: TimeoutError is\
  \ the 3.12 alias for asyncio.TimeoutError\n        _LOGGER.error(\n            \"\
  agent.timeout\",\n            extra={\"event\": \"agent.timeout\", \"correlation_id\"\
  : correlation_id},\n        )\n        _exit_error(\n            code=_E_AGENT_TIMEOUT,\n\
  \            message=f\"Agente excedeu o tempo limite de {int(_AGENT_TIMEOUT)} s.\"\
  ,\n            correlation_id=correlation_id,\n            hint=\"Verifique se os\
  \ servicos MCP estao saudaveis (docker compose ps).\",\n            exit_code=2,\n\
  \        )\n\n    output = _parse_runner_output(raw, correlation_id)\n\n    rows\
  \ = [\n        (exam.name, exam.code, exam.score, exam.inconclusive)\n        for\
  \ exam in output.exams\n    ]\n    table = format_ascii_table(rows, output.appointment_id,\
  \ output.scheduled_for)\n    print(table)\n\n    _LOGGER.info(\n        \"agent.run.done\"\
  ,\n        extra={\n            \"event\": \"agent.run.done\",\n            \"correlation_id\"\
  : correlation_id,\n            \"appointment_id\": output.appointment_id,\n    \
  \        \"exam_count\": len(output.exams),\n        },\n    )\n\n    return 0\n\
  \n\nif __name__ == \"__main__\":\n    sys.exit(main())\n"
agent.py: "\"\"\"no-pii-agent agent — generated by transpiler.\n\nNOTE (adk web /\
  \ adk run dev-server):\n    The `root_agent` module-level variable is kept for `adk\
  \ web` / `adk run`\n    dev-server discovery. It is initialised with correlation_id=\"\
  boot\" — not\n    for production use. Production callers use _build_agent(correlation_id).\n\
  \    The ADK service name convention uses hyphens; Python module uses underscores.\n\
  \"\"\"\n\nfrom __future__ import annotations\n\nimport logging\nimport os\n\nfrom\
  \ urllib.parse import urlparse\n\nimport httpx\nfrom collections.abc import Callable\n\
  from typing import Any\n\nfrom google.adk.agents import LlmAgent\nfrom google.adk.tools.base_tool\
  \ import BaseTool\nfrom google.adk.tools.base_toolset import BaseToolset\nfrom google.adk.tools.mcp_tool\
  \ import McpToolset\nfrom google.adk.tools.mcp_tool.mcp_session_manager import SseConnectionParams\n\
  \n_LOGGER = logging.getLogger(__name__)\n\n_ToolItem = Callable[..., Any] | BaseTool\
  \ | BaseToolset\n\n_SSE_HEADERS: dict[str, str] = {\n    \"Accept\": \"application/json,\
  \ text/event-stream\",\n}\n\n\ndef _build_agent(correlation_id: str) -> LlmAgent:\n\
  \    \"\"\"Build and return the LlmAgent wired with all toolsets.\n\n    Constructs\
  \ McpToolset instances with X-Correlation-ID injected into SSE\n    headers so every\
  \ MCP call is traceable end-to-end (BLOCKER-2).\n\n    Args:\n        correlation_id:\
  \ UUID generated at CLI startup. Injected into all\n            outbound SSE and\
  \ HTTP headers.\n\n    Returns:\n        Fully configured LlmAgent ready for Runner.\n\
  \    \"\"\"\n    _corr_headers = {**_SSE_HEADERS, \"X-Correlation-ID\": correlation_id}\n\
  \n    ocr_toolset = McpToolset(\n        connection_params=SseConnectionParams(\n\
  \            url=os.environ.get(\"OCR_MCP_URL\", \"http://ocr-mcp:8001/sse\"),\n\
  \            headers=_corr_headers,\n        ),\n    )\n\n    _tools: list[_ToolItem]\
  \ = [\n        ocr_toolset,\n    ]\n\n    # ADR-0009: GEMINI_MODEL env overrides\
  \ spec default at runtime\n    return LlmAgent(\n        name=\"no_pii_agent\",\
  \  # ADK requires valid Python identifier\n        model=os.environ.get(\"GEMINI_MODEL\"\
  , \"gemini-2.5-flash\"),\n        description=\"Agent without PII guard\",\n   \
  \     instruction=\"Help the user directly.\",\n        tools=_tools,\n    )\n\n\
  \n# Module-level root_agent for `adk web` / `adk run` dev-server discovery.\n# LAZY:\
  \ built on first attribute access so `import <pkg>.agent` does not\n# trigger a\
  \ blocking httpx.get at import time.\ndef __getattr__(name: str) -> Any:\n    if\
  \ name == \"root_agent\":\n        agent = _build_agent(\"boot\")\n        globals()[\"\
  root_agent\"] = agent\n        return agent\n    raise AttributeError(f\"module\
  \ {__name__!r} has no attribute {name!r}\")\n"
logging_.py: "\"\"\"no-pii-agent structured logging — generated by transpiler.\"\"\
  \"\n\nfrom __future__ import annotations\n\nimport hashlib\nimport json\nimport\
  \ logging\nimport os\nimport time\n\n\nclass _JsonFormatter(logging.Formatter):\n\
  \    \"\"\"Format log records as single-line JSON objects (ADR-0008 § Formato de\
  \ log).\n\n    Fields emitted:\n        timestamp, level, service, event, correlation_id\
  \ (when present),\n        plus any key=value pairs in record.extra.\n\n    Invariant\
  \ (AC21):\n        No raw PII values are emitted. Callers must pass only params_hash,\n\
  \        sha256_prefix, entity_type, duration_ms, correlation_id, etc.\n    \"\"\
  \"\n\n    SERVICE = \"no-pii-agent\"\n\n    def format(self, record: logging.LogRecord)\
  \ -> str:\n        \"\"\"Serialize a LogRecord to a JSON line.\n\n        Args:\n\
  \            record: Standard LogRecord instance.\n\n        Returns:\n        \
  \    JSON-encoded string without a trailing newline.\n        \"\"\"\n        payload:\
  \ dict[str, object] = {\n            \"timestamp\": self.formatTime(record, self.datefmt),\n\
  \            \"level\": record.levelname,\n            \"service\": self.SERVICE,\n\
  \            \"logger\": record.name,\n            \"message\": record.getMessage(),\n\
  \        }\n        # Copy extra fields attached by the caller\n        for key,\
  \ value in record.__dict__.items():\n            if key not in _JSON_SKIP_FIELDS:\n\
  \                payload[key] = value\n        return json.dumps(payload, default=str,\
  \ ensure_ascii=False)\n\n\n_JSON_SKIP_FIELDS = frozenset(\n    {\n        \"args\"\
  ,\n        \"created\",\n        \"exc_info\",\n        \"exc_text\",\n        \"\
  filename\",\n        \"funcName\",\n        \"levelname\",\n        \"levelno\"\
  ,\n        \"lineno\",\n        \"message\",\n        \"module\",\n        \"msecs\"\
  ,\n        \"msg\",\n        \"name\",\n        \"pathname\",\n        \"process\"\
  ,\n        \"processName\",\n        \"relativeCreated\",\n        \"stack_info\"\
  ,\n        \"taskName\",\n        \"thread\",\n        \"threadName\",\n    }\n\
  )\n\n\ndef configure_logging() -> None:\n    \"\"\"Configure root logger with JSON\
  \ formatter for this agent.\n\n    Reads LOG_LEVEL from environment (default: INFO).\n\
  \    \"\"\"\n    level_name = os.environ.get(\"LOG_LEVEL\", \"INFO\").upper()\n\
  \    level = getattr(logging, level_name, logging.INFO)\n    handler = logging.StreamHandler()\n\
  \    handler.setFormatter(_JsonFormatter())\n    root = logging.getLogger()\n  \
  \  root.setLevel(level)\n    if not root.handlers:\n        root.addHandler(handler)\n\
  \    else:\n        root.handlers[0] = handler\n\n\ndef params_hash(params: object)\
  \ -> str:\n    \"\"\"Return the first 16 hex chars of SHA-256 of the JSON-serialised\
  \ params.\n\n    This is the canonical way to log tool call arguments without emitting\n\
  \    raw PII (AC11, parameter inspection pattern).\n\n    Args:\n        params:\
  \ Any JSON-serialisable object representing tool call parameters.\n\n    Returns:\n\
  \        16-character lowercase hex string.\n    \"\"\"\n    serialised = json.dumps(params,\
  \ default=str, sort_keys=True)\n    return hashlib.sha256(serialised.encode(\"utf-8\"\
  )).hexdigest()[:16]\n\n\nclass ToolCallLogger:\n    \"\"\"Context manager that logs\
  \ event=tool.called with timing and params_hash.\n\n    Usage:\n        with ToolCallLogger(\"\
  search_exam_code\", {\"exam_name\": \"Hemograma\"}, cid) as tcl:\n            result\
  \ = await mcp_tool(exam_name=\"Hemograma\")\n        # On exit, emits: event=tool.called,\
  \ tool, params_hash, duration_ms, correlation_id\n\n    Invariant (AC21):\n    \
  \    Only params_hash (not raw params) is logged.\n    \"\"\"\n\n    _logger = logging.getLogger(\"\
  tool\")\n\n    def __init__(self, tool_name: str, params: object, correlation_id:\
  \ str = \"\") -> None:\n        \"\"\"Initialise logger.\n\n        Args:\n    \
  \        tool_name: Name of the tool being called.\n            params: Tool call\
  \ parameters (JSON-serialisable).\n            correlation_id: Propagated correlation\
  \ identifier.\n        \"\"\"\n        self._tool = tool_name\n        self._hash\
  \ = params_hash(params)\n        self._cid = correlation_id\n        self._start:\
  \ float = 0.0\n\n    def __enter__(self) -> \"ToolCallLogger\":\n        \"\"\"\
  Record start time.\"\"\"\n        self._start = time.monotonic()\n        return\
  \ self\n\n    def __exit__(self, *_: object) -> None:\n        \"\"\"Emit tool.called\
  \ log entry.\"\"\"\n        duration_ms = (time.monotonic() - self._start) * 1000\n\
  \        self._logger.info(\n            \"tool.called\",\n            extra={\n\
  \                \"event\": \"tool.called\",\n                \"tool\": self._tool,\n\
  \                \"params_hash\": self._hash,\n                \"duration_ms\":\
  \ round(duration_ms, 2),\n                \"correlation_id\": self._cid,\n     \
  \       },\n        )\n"
preocr.py: "\"\"\"Pre-OCR CLI step — spec 0010 / ADR-0010.\n\nThe CLI calls the OCR\
  \ MCP server directly (via ``mcp.client.sse.sse_client`` +\n``ClientSession``) before\
  \ the ``LlmAgent`` runner starts. The detected exam\nnames are injected into the\
  \ prompt as plain text — the image bytes never\nreach the model. This removes the\
  \ probabilistic \"LLM fabricates base64\"\nfailure documented in ADR-0010.\n\nPublic\
  \ surface:\n    _PreOcrError         — raised on timeout / connection / server errors\n\
  \    _run_preocr          — async function, returns ``list[str]``\n    _build_preocr_prompt\
  \ — builds a single-text-part ``Content`` for the agent\n\"\"\"\n\nfrom __future__\
  \ import annotations\n\nimport asyncio\nimport base64\nimport hashlib\nimport json\n\
  import logging\nimport re\nfrom typing import Any\n\nfrom mcp import ClientSession\n\
  from mcp.client.sse import sse_client\n\n_LOGGER = logging.getLogger(__name__)\n\
  \n_TOOL_NAME = \"extract_exams_from_image\"\n_PROMPT_PREFIX = \"EXAMES DETECTADOS\
  \ (OCR pré-executado pelo CLI):\"\n_PROMPT_SUFFIX = (\n    \"Use essa lista como\
  \ ponto de partida do passo 2 do plano fixo \"\n    \"(search_exam_code em paralelo,\
  \ etc.).\"\n)\n\n# Server ToolError message format: \"[E_OCR_*] <msg> — <hint>\"\
  \n_TOOL_ERROR_RE = re.compile(r\"\\[(E_OCR_[A-Z_]+)\\]\")\n\n\nclass _PreOcrError(Exception):\n\
  \    \"\"\"Raised when the pre-OCR step fails.\n\n    Attributes:\n        code:\
  \ Canonical error code (``E_MCP_UNAVAILABLE`` or any ``E_OCR_*``).\n        message:\
  \ Human-readable message.\n        hint: Optional corrective action.\n    \"\"\"\
  \n\n    def __init__(self, code: str, message: str, hint: str | None = None) ->\
  \ None:\n        super().__init__(message)\n        self.code = code\n        self.message\
  \ = message\n        self.hint = hint\n\n\ndef _extract_exams(result: Any) -> list[str]:\n\
  \    \"\"\"Pull ``list[str]`` out of a ``CallToolResult``.\n\n    FastMCP wraps\
  \ a ``-> list[str]`` tool return in\n    ``structuredContent={\"result\": [...]}``.\
  \ Tolerate both\n    ``structuredContent`` and ``structured_content`` attribute\
  \ spellings.\n    \"\"\"\n    structured = getattr(result, \"structuredContent\"\
  , None)\n    if structured is None:\n        structured = getattr(result, \"structured_content\"\
  , None)\n\n    if isinstance(structured, dict) and \"result\" in structured:\n \
  \       payload = structured[\"result\"]\n    else:\n        payload = structured\n\
  \n    if payload is None:\n        return []\n    if isinstance(payload, list):\n\
  \        return [str(x) for x in payload if isinstance(x, (str, int, float))]\n\
  \    return []\n\n\ndef _server_error_code(result: Any) -> str | None:\n    \"\"\
  \"Return ``E_OCR_*`` if the tool result carries an error; else ``None``.\"\"\"\n\
  \    if not getattr(result, \"isError\", False):\n        return None\n    content\
  \ = getattr(result, \"content\", []) or []\n    for item in content:\n        text\
  \ = getattr(item, \"text\", None)\n        if isinstance(text, str):\n         \
  \   match = _TOOL_ERROR_RE.search(text)\n            if match:\n               \
  \ return match.group(1)\n    return \"E_OCR_UNKNOWN\"\n\n\nasync def _call_once(\n\
  \    *,\n    image_base64: str,\n    correlation_id: str,\n    mcp_url: str,\n \
  \   timeout_s: float,\n) -> list[str]:\n    \"\"\"Open an SSE session, call the\
  \ tool once, return exam list.\n\n    Raises ``_PreOcrError`` on server-side errors;\
  \ lets asyncio.TimeoutError /\n    connection errors bubble to the retry loop in\
  \ ``_run_preocr``.\n    \"\"\"\n    sse_headers = {\n        \"Accept\": \"application/json,\
  \ text/event-stream\",\n        \"X-Correlation-ID\": correlation_id,\n    }\n\n\
  \    async with sse_client(mcp_url, headers=sse_headers) as (read_stream, write_stream):\n\
  \        async with ClientSession(read_stream, write_stream) as session:\n     \
  \       await session.initialize()\n            result = await session.call_tool(\n\
  \                _TOOL_NAME,\n                {\"image_base64\": image_base64},\n\
  \            )\n\n    err_code = _server_error_code(result)\n    if err_code is\
  \ not None:\n        raise _PreOcrError(\n            code=err_code,\n         \
  \   message=\"OCR MCP rejeitou a imagem.\",\n            hint=\"Verifique o log\
  \ do servico ocr-mcp.\",\n        )\n\n    return _extract_exams(result)\n\n\nasync\
  \ def _run_preocr(\n    image_bytes: bytes,\n    correlation_id: str,\n    *,\n\
  \    mcp_url: str,\n    timeout_s: float,\n    connect_retries: int = 1,\n) -> list[str]:\n\
  \    \"\"\"Run the pre-OCR step — spec 0010 AC1, AC6, AC7.\n\n    Pre:\n       \
  \ - ``image_bytes`` non-empty (caller validates file existence).\n        - ``mcp_url``\
  \ is a reachable SSE endpoint.\n\n    Post:\n        Returns ``list[str]`` (possibly\
  \ empty) OR raises ``_PreOcrError``.\n        Never silently swallows connection\
  \ / timeout errors.\n\n    Args:\n        image_bytes: Raw image bytes.\n      \
  \  correlation_id: UUID to propagate as ``X-Correlation-ID``.\n        mcp_url:\
  \ Full SSE URL, e.g. ``http://ocr-mcp:8001/sse``.\n        timeout_s: Hard timeout\
  \ wrapping the full SSE session + tool call.\n        connect_retries: Number of\
  \ reconnect attempts on transport errors.\n    \"\"\"\n    image_base64 = base64.b64encode(image_bytes).decode(\"\
  ascii\")\n    sha_prefix = hashlib.sha256(image_bytes).hexdigest()[:8]\n\n    _LOGGER.info(\n\
  \        \"agent.preocr.invoked\",\n        extra={\n            \"event\": \"agent.preocr.invoked\"\
  ,\n            \"correlation_id\": correlation_id,\n            \"sha256_prefix\"\
  : sha_prefix,\n            \"mcp_url\": mcp_url,\n        },\n    )\n\n    last_transport_error:\
  \ Exception | None = None\n    attempts = max(1, connect_retries + 1)\n    loop\
  \ = asyncio.get_running_loop()\n    started = loop.time()\n\n    for attempt in\
  \ range(1, attempts + 1):\n        try:\n            exams = await asyncio.wait_for(\n\
  \                _call_once(\n                    image_base64=image_base64,\n \
  \                   correlation_id=correlation_id,\n                    mcp_url=mcp_url,\n\
  \                    timeout_s=timeout_s,\n                ),\n                timeout=timeout_s,\n\
  \            )\n        except _PreOcrError:\n            raise\n        except\
  \ (asyncio.TimeoutError, TimeoutError) as exc:\n            _LOGGER.warning(\n \
  \               \"agent.preocr.timeout\",\n                extra={\n           \
  \         \"event\": \"agent.preocr.timeout\",\n                    \"correlation_id\"\
  : correlation_id,\n                    \"attempt\": attempt,\n                 \
  \   \"timeout_s\": timeout_s,\n                },\n            )\n            last_transport_error\
  \ = exc\n            # Timeouts do not retry — they indicate the call itself is\
  \ too slow.\n            break\n        except Exception as exc:  # noqa: BLE001\
  \ — transport layer is broad\n            _LOGGER.warning(\n                \"agent.preocr.transport_error\"\
  ,\n                extra={\n                    \"event\": \"agent.preocr.transport_error\"\
  ,\n                    \"correlation_id\": correlation_id,\n                   \
  \ \"attempt\": attempt,\n                    \"error\": str(exc),\n            \
  \    },\n            )\n            last_transport_error = exc\n            if attempt\
  \ < attempts:\n                continue\n            break\n        else:\n    \
  \        duration_ms = int((loop.time() - started) * 1000)\n            _LOGGER.info(\n\
  \                \"agent.preocr.result\",\n                extra={\n           \
  \         \"event\": \"agent.preocr.result\",\n                    \"correlation_id\"\
  : correlation_id,\n                    \"exam_count\": len(exams),\n           \
  \         \"duration_ms\": duration_ms,\n                },\n            )\n   \
  \         return exams\n\n    raise _PreOcrError(\n        code=\"E_MCP_UNAVAILABLE\"\
  ,\n        message=f\"OCR MCP indisponivel apos {attempts} tentativa(s).\",\n  \
  \      hint=\"Verifique se o servico ocr-mcp esta saudavel (docker compose ps).\"\
  ,\n    ) from last_transport_error\n\n\ndef _build_preocr_prompt(exams: list[str])\
  \ -> Any:\n    \"\"\"Build a text-only ``Content`` with the exam list — spec 0010\
  \ AC3.\n\n    Returns a ``genai_types.Content`` with role=user and exactly one\n\
  \    ``Part(text=...)``. No ``inline_data`` is attached.\n    \"\"\"\n    from google.genai\
  \ import types as genai_types  # noqa: PLC0415\n\n    exam_json = json.dumps(exams,\
  \ ensure_ascii=False)\n    body = f\"{_PROMPT_PREFIX} {exam_json}\\n\\n{_PROMPT_SUFFIX}\"\
  \n    return genai_types.Content(\n        role=\"user\",\n        parts=[genai_types.Part(text=body)],\n\
  \    )\n"
