.env.example: '# Google Gemini API — use direct API key (GOOGLE_GENAI_USE_VERTEXAI=FALSE)
  per ADR-0005

  GOOGLE_GENAI_USE_VERTEXAI=FALSE

  GOOGLE_API_KEY=your-api-key-here

  OCR_MCP_URL=http://ocr-mcp:8001/sse

  LOG_LEVEL=INFO

  '
Dockerfile: 'FROM python:3.12-slim


  WORKDIR /app


  COPY requirements.txt ./

  RUN pip install --no-cache-dir -r requirements.txt


  COPY . .


  ENV GOOGLE_GENAI_USE_VERTEXAI=FALSE


  CMD ["adk", "run", "."]

  '
__init__.py: '"""no-pii-agent — ADK agent package generated by transpiler."""


  from . import agent  # noqa: F401 — required for `adk run` / `adk web` discovery

  from .agent import root_agent


  __all__ = ["agent", "root_agent"]

  '
agent.py: "\"\"\"no-pii-agent agent — generated by transpiler.\"\"\"\n\nfrom __future__\
  \ import annotations\n\nimport os\n\nfrom google.adk.agents import LlmAgent\nfrom\
  \ google.adk.tools.mcp_tool import McpToolset\nfrom google.adk.tools.mcp_tool.mcp_session_manager\
  \ import StreamableHTTPConnectionParams\n\n_SSE_HEADERS: dict[str, str] = {\n  \
  \  \"Accept\": \"application/json, text/event-stream\",\n}\n\nocr_toolset = McpToolset(\n\
  \    connection_params=StreamableHTTPConnectionParams(\n        url=os.environ.get(\"\
  OCR_MCP_URL\", \"http://ocr-mcp:8001/sse\"),\n        headers=_SSE_HEADERS,\n  \
  \  ),\n)\n\nroot_agent = LlmAgent(\n    name=\"no-pii-agent\",\n    model=\"gemini-2.5-flash\"\
  ,\n    description=\"Agent without PII guard\",\n    instruction=\"Help the user\
  \ directly.\",\n    tools=[\n        ocr_toolset,\n    ],\n)\n"
requirements.txt: 'google-adk>=1.0.0

  mcp[cli]>=1.0.0

  '
