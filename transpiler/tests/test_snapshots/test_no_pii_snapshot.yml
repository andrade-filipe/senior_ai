agent.py: "\"\"\"no-pii-agent agent — generated by transpiler.\n\nNOTE (adk web /\
  \ adk run dev-server):\n    The `root_agent` module-level variable is kept for `adk\
  \ web` / `adk run`\n    dev-server discovery. It is initialised with correlation_id=\"\
  boot\" — not\n    for production use. Production callers use _build_agent(correlation_id).\n\
  \    The ADK service name convention uses hyphens; Python module uses underscores.\n\
  \"\"\"\n\nfrom __future__ import annotations\n\nimport logging\nimport os\n\nimport\
  \ httpx\nfrom collections.abc import Callable\nfrom typing import Any\n\nfrom google.adk.agents\
  \ import LlmAgent\nfrom google.adk.tools.base_tool import BaseTool\nfrom google.adk.tools.base_toolset\
  \ import BaseToolset\nfrom google.adk.tools.mcp_tool import McpToolset\nfrom google.adk.tools.mcp_tool.mcp_session_manager\
  \ import StreamableHTTPConnectionParams\n\n_LOGGER = logging.getLogger(__name__)\n\
  \n_ToolItem = Callable[..., Any] | BaseTool | BaseToolset\n\n_SSE_HEADERS: dict[str,\
  \ str] = {\n    \"Accept\": \"application/json, text/event-stream\",\n}\n\n\ndef\
  \ _build_agent(correlation_id: str) -> LlmAgent:\n    \"\"\"Build and return the\
  \ LlmAgent wired with all toolsets.\n\n    Constructs McpToolset instances with\
  \ X-Correlation-ID injected into SSE\n    headers so every MCP call is traceable\
  \ end-to-end (BLOCKER-2).\n\n    Args:\n        correlation_id: UUID generated at\
  \ CLI startup. Injected into all\n            outbound SSE and HTTP headers.\n\n\
  \    Returns:\n        Fully configured LlmAgent ready for Runner.\n    \"\"\"\n\
  \    _corr_headers = {**_SSE_HEADERS, \"X-Correlation-ID\": correlation_id}\n\n\
  \    ocr_toolset = McpToolset(\n        connection_params=StreamableHTTPConnectionParams(\n\
  \            url=os.environ.get(\"OCR_MCP_URL\", \"http://ocr-mcp:8001/sse\"),\n\
  \            headers=_corr_headers,\n        ),\n    )\n\n    _tools: list[_ToolItem]\
  \ = [\n        ocr_toolset,\n    ]\n\n    return LlmAgent(\n        name=\"no_pii_agent\"\
  ,  # ADK requires valid Python identifier\n        model=\"gemini-2.5-flash\",\n\
  \        description=\"Agent without PII guard\",\n        instruction=\"Help the\
  \ user directly.\",\n        tools=_tools,\n    )\n\n\n# Module-level root_agent\
  \ for `adk web` / `adk run` dev-server discovery.\n# LAZY: built on first attribute\
  \ access so `import <pkg>.agent` does not\n# trigger a blocking httpx.get at import\
  \ time.\ndef __getattr__(name: str) -> Any:\n    if name == \"root_agent\":\n  \
  \      agent = _build_agent(\"boot\")\n        globals()[\"root_agent\"] = agent\n\
  \        return agent\n    raise AttributeError(f\"module {__name__!r} has no attribute\
  \ {name!r}\")\n"
